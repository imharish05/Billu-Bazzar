<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
    <!-- Premium background card -->
    <rect width="600" height="800" fill="#FAF9F5"/>
    <rect x="20" y="20" width="560" height="760" fill="none" stroke="#C9A24B" stroke-width="1.5"/>
    <rect x="26" y="26" width="548" height="748" fill="none" stroke="#C9A24B" stroke-width="0.5" stroke-dasharray="3,3"/>
    
    <!-- Branding -->
    <text x="300" y="80" font-family="Cinzel, Playfair Display, Georgia, serif" font-size="20" font-weight="bold" fill="#1A1A1A" text-anchor="middle" letter-spacing="4">BILLU BAZAAR</text>
    <text x="300" y="110" font-family="Inter, sans-serif" font-size="10" fill="#C9A24B" text-anchor="middle" letter-spacing="3">360° INTERACTIVE ROTATION</text>
    <path d="M260,130 L340,130" stroke="#C9A24B" stroke-width="1"/>
    
    <!-- Ring Band -->
    <ellipse cx="300" cy="420" rx="100" ry="35" fill="none" stroke="#C9A24B" stroke-width="6"/>
    <ellipse cx="300" cy="420" rx="100" ry="35" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    
    <!-- Connecting wireframes -->
    <line x1="300" y1="455" x2="249.99999999999994" y2="318.34936490538905" stroke="#C9A24B" stroke-width="1.5" stroke-dasharray="2,2"/>
    
    <!-- Rotating Gem (Diamond Shape) -->
    <g transform="translate(249.99999999999994, 318.34936490538905)">
      <!-- Outer Gem Facets -->
      <polygon points="0,-30 40,-10 20,30 -20,30 -40,-10" fill="#FAF9F5" stroke="#C9A24B" stroke-width="2"/>
      <!-- Inner Facet lines -->
      <line x1="0" y1="-30" x2="0" y2="30" stroke="#C9A24B" stroke-width="1"/>
      <line x1="-40" y1="-10" x2="40" y2="-10" stroke="#C9A24B" stroke-width="1"/>
      <line x1="0" y1="-30" x2="-20" y2="30" stroke="#C9A24B" stroke-width="1"/>
      <line x1="0" y1="-30" x2="20" y2="30" stroke="#C9A24B" stroke-width="1"/>
    </g>

    <!-- Bottom Instructions and Angle indicator -->
    <circle cx="300" cy="650" r="30" fill="none" stroke="#C9A24B" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="300" y="654" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#1A1A1A" text-anchor="middle">330°</text>
    <text x="300" y="710" font-family="Inter, sans-serif" font-size="11" fill="#7A7A7A" text-anchor="middle" letter-spacing="1">DRAG LEFT OR RIGHT TO ROTATE</text>
    <text x="300" y="730" font-family="Inter, sans-serif" font-size="9" fill="#C9A24B" text-anchor="middle" font-weight="bold">FRAME 12 / 12</text>
  </svg>